<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Mirtillo felice">
  <defs>
    <radialGradient id="berry" cx="40%" cy="36%" r="70%">
      <stop offset="0%" stop-color="#9fb0f6"/>
      <stop offset="45%" stop-color="#5566cf"/>
      <stop offset="100%" stop-color="#2b2e86"/>
    </radialGradient>
  </defs>

  <!-- coroncina (calyx) del mirtillo -->
  <path d="M50,16 L52.6,22.4 L59.4,22.9 L53.7,27.3 L55.5,33.9 L50,30.3 L44.5,33.9 L46.3,27.3 L40.6,22.9 L47.4,22.4 Z"
        fill="#2a2d7a"/>

  <!-- corpo della bacca -->
  <circle cx="50" cy="59" r="34" fill="url(#berry)"/>

  <!-- velo chiaro (pruina) -->
  <ellipse cx="39" cy="46" rx="13" ry="8.5" fill="#ffffff" opacity="0.16" transform="rotate(-25 39 46)"/>

  <!-- guance -->
  <ellipse cx="33.5" cy="66" rx="5" ry="3.2" fill="#ff8fbf" opacity="0.55"/>
  <ellipse cx="66.5" cy="66" rx="5" ry="3.2" fill="#ff8fbf" opacity="0.55"/>

  <!-- occhi -->
  <ellipse cx="40" cy="57" rx="6" ry="7.2" fill="#ffffff"/>
  <ellipse cx="60" cy="57" rx="6" ry="7.2" fill="#ffffff"/>
  <circle cx="41" cy="59.2" r="3.2" fill="#222a63"/>
  <circle cx="59" cy="59.2" r="3.2" fill="#222a63"/>
  <circle cx="39.5" cy="56.4" r="1.3" fill="#ffffff"/>
  <circle cx="57.5" cy="56.4" r="1.3" fill="#ffffff"/>

  <!-- sorriso -->
  <path d="M39.5,66.5 Q50,77.5 60.5,66.5" fill="none" stroke="#222a63" stroke-width="3.3" stroke-linecap="round"/>

  <!-- scintilla -->
  <path d="M77,32 l1.7,3.6 l3.6,1.7 l-3.6,1.7 l-1.7,3.6 l-1.7,-3.6 l-3.6,-1.7 l3.6,-1.7 Z" fill="#ffffff" opacity="0.92"/>
</svg>
