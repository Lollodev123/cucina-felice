<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#ff6f3c">
  <title>Cucina Felice 🍅 — Ricette low-FODMAP</title>
  <meta name="description" content="50+ ricette italiane semplici, colorate e profumate, pensate per la dieta low-FODMAP (senza aglio/cipolla, senza lattosio, pochi legumi).">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8D%85%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="css/styles.css">

  <!-- PWA: installabile e utilizzabile offline -->
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="assets/icon-180.png">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Cucina Felice">
</head>
<body>
  <div class="app">
    <!-- BARRA SUPERIORE -->
    <header class="topbar">
      <div class="topbar__row">
        <div class="logo" id="logo">
          <div class="logo__mark">🍅</div>
          <div>
            <div class="logo__name">Cucina Felice</div>
            <div class="logo__sub">ricette low-FODMAP · facili · colorate</div>
          </div>
        </div>
        <div class="spacer"></div>
        <div class="streak" id="streak" title="Ricette cucinate">🔥 0</div>
        <button class="icon-btn" id="btn-filters" title="Mostra/nascondi filtri" aria-label="Filtri">🎛️</button>
        <button class="icon-btn" id="btn-add" title="Aggiungi ricetta" aria-label="Aggiungi ricetta">➕</button>
        <button class="icon-btn" id="btn-settings" title="Impostazioni" aria-label="Impostazioni">⚙️</button>
      </div>

      <div class="tools" id="tools">
        <label class="search">
          🔎
          <input id="search" type="search" placeholder="Cerca una ricetta o un ingrediente…" aria-label="Cerca">
        </label>
        <button class="btn-surprise" id="btn-surprise" title="Ricetta a caso">
          🎲 <span class="txt">Sorprendimi</span>
        </button>
      </div>
    </header>

    <!-- FILTRI RAPIDI (sempre visibili) -->
    <nav class="quickbar" id="quickbar" aria-label="Filtri rapidi"></nav>

    <!-- FILTRI COMPLETI (a scomparsa) -->
    <section class="filters" id="filters" aria-label="Filtri"></section>

    <!-- CONTENUTO (lista o dettaglio) -->
    <main id="view"></main>
  </div>

  <!-- elementi globali -->
  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <canvas id="confetti" aria-hidden="true"></canvas>

  <!-- dati + logica (script classici: funzionano anche aprendo il file in locale) -->
  <script src="data/recipes.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/filters.js"></script>
  <script src="js/timer.js"></script>
  <script src="js/form.js"></script>
  <script src="js/app.js"></script>

  <!-- registra il service worker (solo su https o localhost) -->
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("sw.js").catch(function () {});
      });
    }
  </script>
</body>
</html>
